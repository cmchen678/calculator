<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="container">
        <div id="display">0</div>
        <div id="btn-container">
            <button class="num-btn" data-num="7">7</button>
            <button class="num-btn" data-num="8">8</button>
            <button class="num-btn" data-num="9">9</button>
            <button class="operator-btn" data-num="/">÷</button>
            <button class="num-btn" data-num="4">4</button>
            <button class="num-btn" data-num="5">5</button>
            <button class="num-btn" data-num="6">6</button>
            <button class="operator-btn" data-num="*">x</button>
            <button class="num-btn" data-num="1">1</button>
            <button class="num-btn" data-num="2">2</button>
            <button class="num-btn" data-num="3">3</button>
            <button class="operator-btn" data-num="-">-</button>
            <button class="num-btn" data-num="0">0</button>
            <button class="num-btn decimal-btn" data-num=".">.</button>
            <button id="clear-btn">C</button>
            <button class="operator-btn" data-num="+">+</button>
            <button id="equals-btn">=</button>
        </div>
    </div>
</body>
</html>
